services:
  api:
    build:
      context: ../
      dockerfile: APIKros/Dockerfile.dev
    container_name: api
    working_dir: /src/APIKros
    volumes:
      - ../:/src
    command: dotnet watch run --urls http://0.0.0.0:8080
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_TRUST_CERTIFICATE=${DB_TRUST_CERTIFICATE}
    depends_on:
      - sqlserver
    networks:
      - app_network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sqlserver
    ports:
      - "127.0.0.1:${DB_PORT}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Developer
    restart: unless-stopped
    networks:
      - app_network

  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "127.0.0.1:8081:8080"
    restart: unless-stopped
    networks:
      - app_network

volumes:
  sqlserver_data:

networks:
  app_network:
    driver: bridge