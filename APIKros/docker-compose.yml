services:
  api:
    build:
      context: ../
      dockerfile: APIKros/Dockerfile
    
    container_name: api
    working_dir: /src/APIKros
    volumes:
      - ../:/src
      - api_bin:/src/APIKros/bin
      - api_obj:/src/APIKros/obj
      - nuget_cache:/home/ubuntu/.nuget/packages
    ports: 
      - "127.0.0.1:8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_TRUST_CERTIFICATE=${DB_TRUST_CERTIFICATE}
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
    depends_on:
      - sqlserver
    networks:
      - app_network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sqlserver
    ports:
      - "127.0.0.1:${DB_PORT}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Developer
    restart: unless-stopped
    networks:
      - app_network

  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "127.0.0.1:8081:8080"
    restart: unless-stopped
    networks:
      - app_network

volumes:
  sqlserver_data:
  api_bin:
  api_obj:
  nuget_cache:

networks:
  app_network:
    driver: bridge